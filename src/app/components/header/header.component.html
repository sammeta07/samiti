<mat-toolbar class="samiti-header" role="banner">
  <div class="brand">
    <span class="logo">S<span class="accent">AM</span>ITI</span>
    <span class="tagline">Digital Group Management</span>
  </div>

  <span class="spacer"></span>

  <!-- Global Search Pill -->
  <div class="search-pill" role="search" aria-label="Search" [class.pill-active]="isSearchFocused">

    <!-- Search input side -->
    <div class="pill-left">
      <mat-icon class="pill-search-icon" aria-hidden="true">search</mat-icon>
      <input
        #pillInput
        class="pill-input"
        type="text"
        placeholder="Search groups, events, programs…"
        autocomplete="off"
        aria-label="Search groups, events and programs"
        [value]="searchQuery()"
        (input)="onSearch($event)"
        (focus)="isSearchFocused = true"
        (blur)="isSearchFocused = false"
      />
      @if (searchQuery()) {
        <button class="pill-clear" type="button" aria-label="Clear" (click)="clearSearch()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>

    <!-- Divider -->
    <span class="pill-divider" aria-hidden="true"></span>

    <!-- Distance selector side -->
    <div class="pill-right">
      <mat-form-field class="km-field" appearance="outline" subscriptSizing="dynamic">
        <mat-icon matPrefix aria-hidden="true">radar</mat-icon>
        <mat-select
          [value]="selectedDistance()"
          (selectionChange)="onDistanceChange($event.value)"
          aria-label="Search radius"
          disableRipple
          panelClass="km-panel"
        >
          @for (km of distanceOptions; track km) {
            <mat-option [value]="km">{{ km }} km</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

  </div>

  <span class="spacer"></span>

  <!-- Location chip -->
  <button
    class="location-btn"
    type="button"
    [class.loading]="!userLocationCords()"
    [matTooltip]="userLocationCords() ? 'Your current location' : 'Detecting location…'"
    matTooltipPosition="below"
    (click)="retryLocation()"
    aria-live="polite"
    [attr.aria-label]="userLocationName() || 'Detecting location'"
  >
    <mat-icon [class.spin]="!userLocationCords()">
      {{ userLocationCords() ? 'my_location' : 'autorenew' }}
    </mat-icon>
    <span class="location-text">
      {{ userLocationName() || 'Locating…' }}
    </span>
  </button>

  <!-- Auth actions -->
  <div class="actions">
    <button class="btn-outline" type="button">
      <mat-icon aria-hidden="true">person_add</mat-icon>
      Register
    </button>
    <button class="btn-accent" type="button">
      <mat-icon aria-hidden="true">login</mat-icon>
      Login
    </button>
  </div>
</mat-toolbar>
