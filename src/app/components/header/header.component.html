<mat-toolbar class="samiti-header" role="banner">
  <div class="brand">
    <span class="logo">S<span class="accent">AM</span>ITI</span>
    <span class="tagline">Digital Group Management</span>
  </div>

  <span class="spacer"></span>

  <!-- Location chip -->
  <button
    class="location-btn"
    type="button"
    [class.loading]="!userLocationCords()"
    [matTooltip]="userLocationCords() ? 'Your current location' : 'Detecting location…'"
    matTooltipPosition="below"
    (click)="retryLocation()"
    aria-live="polite"
    [attr.aria-label]="userLocationName() || 'Detecting location'"
  >
    <mat-icon [class.spin]="!userLocationCords()">
      {{ userLocationCords() ? 'my_location' : 'autorenew' }}
    </mat-icon>
    <span class="location-text">
      {{ userLocationName() || 'Locating…' }}
    </span>
  </button>

  <!-- Auth actions -->
  <div class="actions">
    <button class="btn-outline" type="button">
      <mat-icon aria-hidden="true">person_add</mat-icon>
      Register
    </button>
    <button class="btn-accent" type="button">
      <mat-icon aria-hidden="true">login</mat-icon>
      Login
    </button>
  </div>
</mat-toolbar>
