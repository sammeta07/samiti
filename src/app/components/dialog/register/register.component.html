<header>
  <h2>Register</h2>
  <!-- <span class="register-instruction">Create a new account to get started.</span> -->
  <button mat-icon-button type="button" (click)="onCancel()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</header>

<div class="dialog-body">
  <form class="register-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Full Name</mat-label>
      <input matInput [(ngModel)]="name" name="name" placeholder="Ex. John Doe" required>
      <mat-icon matPrefix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput [(ngModel)]="email" name="email" placeholder="Ex. user@example.com" required email>
      <mat-icon matPrefix>email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Mobile Number</mat-label>
      <input matInput [(ngModel)]="mobile" name="mobile" placeholder="Ex. 9876543210" required type="tel">
      <mat-icon matPrefix>phone</mat-icon>
    </mat-form-field>

    <!-- <div class="gender-group">
      <label class="gender-label">Gender</label>
      <mat-radio-group [(ngModel)]="gender" name="gender" required>
        <mat-radio-button value="male">Male</mat-radio-button>
        <mat-radio-button value="female">Female</mat-radio-button>
        <mat-radio-button value="other">Other</mat-radio-button>
      </mat-radio-group>
    </div> -->

    <div class="custom-outline-field">
      <span class="custom-label">Gender*</span>
      <mat-radio-group [(ngModel)]="gender" name="gender" required>
        <mat-radio-button value="male">Male</mat-radio-button>
        <mat-radio-button value="female">Female</mat-radio-button>
        <mat-radio-button value="other">Other</mat-radio-button>
      </mat-radio-group>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date of Birth</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="dateOfBirth" name="dateOfBirth" required>
      <mat-icon matPrefix>cake</mat-icon>
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password" name="password" required>
      <mat-icon matPrefix>lock</mat-icon>
      <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'"
        [attr.aria-pressed]="hidePassword" type="button">
        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" [(ngModel)]="confirmPassword"
        name="confirmPassword" required>
      <mat-icon matPrefix>lock_outline</mat-icon>
      <button mat-icon-button matSuffix (click)="hideConfirmPassword = !hideConfirmPassword"
        [attr.aria-label]="'Hide confirm password'" [attr.aria-pressed]="hideConfirmPassword" type="button">
        <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
    </mat-form-field>

    <p class="password-mismatch" *ngIf="confirmPassword && !passwordsMatch">
      <mat-icon>error_outline</mat-icon> Passwords do not match.
    </p>
  </form>
</div>

<footer>
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-stroked-button (click)="onSubmit()" [disabled]="!isFormValid" type="button">
    <mat-icon>person_add</mat-icon> Register
  </button>
</footer>
