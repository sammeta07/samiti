<header>
  <h2>Create Committee</h2>
  <button mat-icon-button type="button" (click)="onCancel()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</header>

<div class="dialog-body">
  <form class="create-committee-form" #committeeForm="ngForm">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Committee Name</mat-label>
      <input matInput [(ngModel)]="committeeName" name="committeeName" placeholder="Ex. Rudra Boys Club" required>
      <mat-icon matPrefix>gavel</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="half-width">
      <mat-label>Since (Year)</mat-label>
      <input matInput [(ngModel)]="sinceYear" name="sinceYear" type="number" placeholder="Ex. 2026" required>
      <mat-icon matPrefix>calendar_today</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="half-width">
      <mat-label>Area / Location</mat-label>
      <input matInput [(ngModel)]="areaLocation" name="areaLocation" placeholder="Ex. Zone-1, BMY, Charoda" required>
      <mat-icon matPrefix>place</mat-icon>
    </mat-form-field>

    <div class="contact-numbers-section">
      <span class="section-label">Contact Numbers</span>
      <div class="contact-fields">
        
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Primary Contact</mat-label>
          <input matInput [(ngModel)]="primaryContact" name="primaryContact" placeholder="Ex. 9876543210" required type="tel">
          <mat-icon matPrefix>phone</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Secondary Contact (Optional)</mat-label>
          <input matInput [(ngModel)]="secondaryContact" name="secondaryContact" placeholder="Ex. 9876543211" type="tel">
          <mat-icon matPrefix>phone</mat-icon>
        </mat-form-field>
        
      </div>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput [(ngModel)]="description" name="description" placeholder="Describe the committee's purpose and activities..." required rows="4"></textarea>
      <mat-icon matPrefix>description</mat-icon>
    </mat-form-field>
    
  </form>
</div>

<footer>
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-stroked-button (click)="onSubmit()" [disabled]="!isFormValid" type="button" class="submit-action-btn">
    <mat-icon>add</mat-icon> Create Committee
  </button>
</footer>
